<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Character Selection</title>
        <link href="style.css" alt="stylesheet">
    </head>
    <body>
        <section class="container">
            <form id="characterForm" type="get" action="page3.html">
                <fieldset>
                    <legend>Choose your Character</legend>
                    <input type="radio" name="aria" id="aria" value="Aria">
                    <label for="aria">Aria, the Warrior</label>
                    <input type="radio" name="eldrin" id="eldrin" value="Eldrin">
                    <label for="eldrin">Eldrin, the Mage</label>
                    <input type="radio" name="tara" id="tara" value="Tara">
                    <label for="tara">Tara, the Rogue</label>
                </fieldset>
                <input type="submit" id="continue">
            </form>
        </section>
    </body>
</html>
