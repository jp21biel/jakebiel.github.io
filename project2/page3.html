<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Quest Begins</title>
        <link href="style.css" alt="stylesheet">
    </head>
    <body>
        <section class="container">
            <h1>Pack Your Bag</h1>
            <p>Select the supplies you wish to take on your quest. Choose wisely, as you can only carry a limited amount.</p>
            <form id="itemForm" type="get" action="page4.html">
                <fieldset>
                    <legend>Choose your Character</legend>
                    <input type="radio" name="food" id="food" value="Food">
                    <label for="food">Food</label>
                    <input type="radio" name="water" id="water" value="Water">
                    <label for="water">Water</label>
                    <input type="radio" name="potions" id="potions" value="Potions">
                    <label for="potions">Magic Potions</label>
                    <input type="radio" name="maps" id="maps" value="Maps">
                    <label for="maps">Maps</label>
                    <input type="radio" name="sword" id="sword" value="Sword">
                    <label for="sword">Sword</label>
                </fieldset>
                <input type="submit" id="continue">
            </form>
        </section>
    </body>
</html>
