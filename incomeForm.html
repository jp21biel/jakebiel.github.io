<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Income Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            form {
                display: flex;
                flex-direction: column;
            }
            div {
                display: flex;
                flex-direction: row;
                padding: 1px;
            }
            label {
                padding-right: 5px;
            }
            .customButton  {
                width: 75px;
            }
        </style>
    </head>
    <body>
        <main class="container">
            <h1>Add Income</h1>
            <form action="income.js" id="incomeForm">
                <div class="mb-3">
                    <label for="incomeSource" class="formLabel">Income Source Name:  </label>
                    <input type="text" id="incomeSource" required minlength="3" class="formControl">
                </div>
                <div class="mb-3">
                    <label for="amount" class="formLabel">Amount:  </label>
                    <input type="text" id="amount" required class="formControl">
                </div>
                <div class="mb-3">
                    <label for="frequency" class="formLabel">Frequency:  </label>
                    <select name="frequency" id="frequency" class="formControl">
                        <option value="one-time">One-Time</option>
                        <option value="bi-weekly">Bi-Weekly</option>
                        <option value="monthly" selected>Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>
                <button type="submit" class="custombuttom btn btn-primary">Submit</button>
            </form>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="income.js"></script>
    </body>
</html>
